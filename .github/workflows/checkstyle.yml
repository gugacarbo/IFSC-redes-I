name: Checkstyle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  checkstyle-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -w @ifsc/tools-java

      - name: Verify checkstyle.jar was downloaded
        run: |
          if [ -f tools/java/checkstyle.jar ]; then
            echo "checkstyle.jar exists"
            ls -lh tools/java/checkstyle.jar
          else
            echo "checkstyle.jar NOT found (tests don't download it)"
          fi
